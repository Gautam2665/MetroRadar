version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: metroradar-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: metroradar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: metroradar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: metroradar-backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/metroradar?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: metroradar-frontend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:
