name: MetroRadar CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metroradar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/metroradar?schema=public"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Database Client
        run: npm run db:generate

      - name: Run Prisma Migrations
        run: npx prisma migrate deploy --schema=database/prisma/schema.prisma

      - name: Seed Database
        run: npx prisma db seed

      - name: Lint Check
        run: npm run lint

      - name: Build Backend
        run: npm run build:backend

      - name: Build Frontend
        run: npm run build:frontend

      - name: Run Tests
        run: npm run test && npm run test:e2e --workspace=apps/backend
